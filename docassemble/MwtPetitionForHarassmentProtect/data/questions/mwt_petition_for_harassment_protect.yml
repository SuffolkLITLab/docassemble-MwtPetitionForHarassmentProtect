fields:
  - "The Defendant has committed acts of 'Unlawful Harassment' as follows. Describe specific acts of harassment and their approximate dates, beginning with the most recent act. You may want to include police responses or reports.": statement_1
    input type: area
  - "Continued Statement": additional_statement
    input type: area
    required: False
  - "If you request a fee waiver, describe the incident or incidents involving stalking, a sex offense, or domestic violence": statement_2
    input type: area
    required: False
  - "I record this statement in the town of": town_name
  - "Date of Statement": statement_date
    datatype: date
---
id: Law Enforcement Information
question: |
  Law Enforcement Information
subquestion: |
  Check all situations that apply in ${ protected_person_name }'s case.
fields:
  - "Unlawful Harassment": is_unlawful_harassment
    datatype: yesno
  - "Dissolution or Separation or Invalidity or Nonparental Custody or Paternity": is_separation_invalidity_nonparental_custody_paternity
    datatype: yesno
  - "Sexual Assault": is_sexual_assault
    datatype: yesno
  - "The 'Unlawful Harassment' took place within the boundaries of the MWT Reservation": is_events_on_reservation
    datatype: yesno
---
id: Defendant Vehicle Information
question: |
  Defendant Vehicle Information
subquestion: |
  Provide information about the defendant's driver's license and vehicle, if known.
fields:
  - "Driver's License Number": defendants[0].driver_license_number
    required: False
  - "Driver's License Issuing State": defendants[0].license_state
    required: False
  - "Vehicle Make and Model": defendants[0].vehicle_make_model
    required: False
  - "Vehicle License Number": defendants[0].vehicle_license_number
    required: False
  - "Vehicle License Year": defendants[0].vehicle_license_year
    datatype: number
    required: False
---
id: Defendant Employment
question: |
  Defendant Employment
subquestion: |
  Provide information about where the defendant works, if known.
fields:
  - "Defendant's Employer": defendant_employer
    required: False
  - "Work Phone Number": defendants[0].work_phone_number
    required: False
  - "Employer Address": defendants[0].employer_address
    required: False
  - "Work Hours": defendants[0].work_hours
    required: False
---
id: Restrained Person Impairment
question: |
  Defendant Impairment
subquestion: |
  Please indicate whether the defendant has any known impairment.
fields:
  - "Is the defendant impaired?": impaired
    datatype: yesnoradio
  - "Describe disability or impairment": disability_or_injury_description
    input type: area
    show if:
      variable: impaired
      is: True
---
code: |
  if impaired:
    is_impaired = True
    is_not_impaired = False
  else:
    is_impaired = False
    is_not_impaired = True
---
id: Hazard Information
question: |
  Hazard Information
subquestion: |
  Select all that apply to the defendant’s history.
fields:
  - "Assault with Weapons": is_assault_with_weapons
    datatype: yesno
  - "Other": is_other_hazard
    datatype: yesno
  - "Suicide Attempt or Threats": is_suicide_attempt_or_threats
    datatype: yesno
  - "Involuntary or Voluntary Commitment": is_involuntary_voluntary_commitment
    datatype: yesno
  - "Alcohol or Drug Abuse": is_alcohol_drug_abuse
    datatype: yesno
  - "Assault": is_assault
    datatype: yesno
---
id: Weapon Possession
question: |
  Weapon Possession
subquestion: |
  Indicate any weapon that the defendant possesses, if known.
fields:
  - "Rifles": has_rifles
    datatype: yesno
  - "Explosives": has_explosives
    datatype: yesno
  - "Knives": has_knives
    datatype: yesno
  - "Handguns": has_handguns
    datatype: yesno
  - "Other": has_other_weapon
    required: False
---
id: Location of Weapons
question: |
  Location of Weapons
subquestion: |
  Where does the defendant keep any weapons, if known?
fields:
  - "Vehicle": is_vehicle
    datatype: yesno
  - "Residence": is_residence
    datatype: yesno
  - "On Person": is_on_person
    datatype: yesno
  - "Describe any weapons and their locations in detail": weapon_location_description
    required: False
---
id: Current Status Cohabitation
question: |
  Current Status: Cohabitation
subquestion: |
  Please provide information about the defendant’s awareness of this petition and the defendant’s relationship to ${ protected_person_name }.
fields:
  - "Does the defendant know you’re trying to get this order?": order_aware
    datatype: radio
    choices:
      - "N/A": "NA"
      - "Yes": "Yes"
      - "No": "No"
  - "Is the defendant likely to react violently when served?": violent
    datatype: radio
    choices:
      - "N/A": "NA"
      - "Yes": "Yes"
      - "No": "No"
  - "Is the defendant a current or former cohabitant as an intimate partner?": cohabitant
    datatype: radio
    choices:
      - "N/A": "NA"
      - "Yes": "Yes"
      - "No": "No"
  - "Are you and the defendant currently living together?": current
    datatype: radio
    show if:
      variable: cohabitant
      is: "Yes"
    choices:
      - "N/A": "NA"
      - "Yes": "Yes"
      - "No": "No"
  - "Does the defendant know he or she may be moved out of the home?": moved
    datatype: radio
    show if:
      variable: current
      is: "Yes"
    choices:
      - "N/A": "NA"
      - "Yes": "Yes"
      - "No": "No"
---
code: |
  if order_aware == "NA":
    is_defendant_aware_not_applicable = True
    is_defendant_aware = False
    is_defendant_not_aware = False
  elif order_aware == "Yes":
    is_defendant_aware_not_applicable = False
    is_defendant_aware = True
    is_defendant_not_aware = False
  elif order_aware == "No":
    is_defendant_aware_not_applicable = False
    is_defendant_aware = False
    is_defendant_not_aware = True

  if violent == "NA":
    is_violent_not_applicable = True
    is_violent = False
    is_not_violent = False
  elif violent == "Yes":
    is_violent_not_applicable = False
    is_violent = True
    is_not_violent = False
  elif violent == "No":
    is_violent_not_applicable = False
    is_violent = False
    is_not_violent = True

  if cohabitant == "NA":
    is_intimate_not_applicable = True
    is_intimate = False
    is_not_intimate = False
    current = "NA"
  elif cohabitant == "Yes":
    is_intimate_not_applicable = False
    is_intimate = True
    is_not_intimate = False
  elif cohabitant == "No":
    is_intimate_not_applicable = False
    is_intimate = False
    is_not_intimate = True
    current = "NA"

  if current == "NA":
    is_together_not_applicable = True
    is_living_together = False
    is_not_living_together = False
    moved = "NA"
  elif current == "Yes":
    is_together_not_applicable = False
    is_living_together = True
    is_not_living_together = False
  elif current == "No":
    is_together_not_applicable = False
    is_living_together = False
    is_not_living_together = True
    moved = "NA"

  if moved == "NA":
    is_move_aware_not_applicable = True
    is_move_aware = False
    is_not_move_aware = False
  elif moved == "Yes":
    is_move_aware_not_applicable = False
    is_move_aware = True
    is_not_move_aware = False
  elif moved == "No":
    is_move_aware_not_applicable = False
    is_move_aware = False
    is_not_move_aware = True
---
id: mwt_petition_for_harassment_protect_preview_question
