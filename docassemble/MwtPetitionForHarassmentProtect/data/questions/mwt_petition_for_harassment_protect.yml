  Here is a preview of ${ protected_person_name }'s petition. Review it carefully before continuing.

  Click the image to open it in a new tab. Click the "Edit answers" button to edit your answers.

  ${ action_button_html(url_action('review_mwt_petition_for_harassment_protect'), label='Edit answers', color='info') }

  Remember to come back to this window to continue and sign your form.
continue button field: mwt_petition_for_harassment_protect_preview_question
---
id: filing_method_choice
question: |
  How would you like to file your petition?
subquestion: |
  The petition for ${ protected_person_name } is complete and ready to be filed.

  If you would like to download your petition and go to the court to file it in person, click **Download now**.

  If you would like to file your petition electronically, click **Next** to continue. You will be asked to complete an electronic signature before submitting your petition online.
continue button field: filing_method_choice
action buttons:
  - label: Download now
    action: mwt_petition_for_harassment_protect_download
    color: primary
---
id: plaintiff_signature
question: |
  Sign your petition
subquestion: |
  Please sign your name below for ${ protected_person_name }'s petition.
signature: plaintiffs[0].signature
under: |
  ${ protected_person_name }
---
